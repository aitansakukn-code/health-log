<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栄養管理トラッカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7f2;
    --white: #ffffff;
    --surface2: #f0f3ec;
    --border: #e2e8d9;
    --accent: #3d7a2f;
    --accent-light: #e8f5e0;
    --accent-mid: #6ab04c;
    --text: #1a2a14;
    --text-muted: #7a8f6e;
    --danger: #e05252;
    --danger-light: #fdeaea;
    --warning: #d4891a;
    --warning-light: #fef3e2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  .header {
    background: var(--accent);
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-icon { font-size: 26px; }

  .header-text h1 {
    font-size: 17px;
    font-weight: 900;
    color: #fff;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    margin-top: 1px;
  }

  .date-strip {
    background: var(--accent);
    padding: 0 20px 14px;
  }

  .date-strip .date-text {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
  }

  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 16px 16px 100px;
  }

  /* BUDGET CARD */
  .budget-card {
    background: var(--white);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(61,122,47,0.08);
    border: 1.5px solid var(--border);
  }

  .budget-card-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .budget-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .budget-amount {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .budget-amount .yen { font-size: 18px; color: var(--text-muted); }

  .budget-limit-badge {
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 20px;
  }

  .progress-track {
    background: var(--surface2);
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent-mid));
    transition: width 0.4s ease, background 0.3s;
  }

  .budget-status {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--white);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
    border: 1.5px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    border-radius: 11px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(61,122,47,0.3);
  }

  .section-header {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    margin-top: 20px;
    padding-left: 2px;
  }

  /* MEAL CARDS */
  .meal-cards { display: flex; flex-direction: column; gap: 10px; }

  .meal-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .meal-card:focus-within {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(61,122,47,0.1);
  }

  .meal-card.has-content { border-color: var(--accent-mid); }

  .meal-card-top {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .meal-icon {
    font-size: 22px;
    width: 40px;
    height: 40px;
    background: var(--white);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }

  .meal-info { flex: 1; }
  .meal-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .meal-time { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .meal-price-badge {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-light);
    padding: 4px 10px;
    border-radius: 20px;
    min-width: 60px;
    text-align: center;
    flex-shrink: 0;
  }

  .meal-price-badge.empty { color: var(--text-muted); background: var(--white); border: 1px solid var(--border); }

  .meal-card-body { padding: 12px 14px; }

  .meal-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 56px;
    line-height: 1.6;
  }

  .meal-input::placeholder { color: #b0bfa8; }
  .meal-input:focus { border-color: var(--accent); background: #fff; }

  .price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .price-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .price-input {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    width: 110px;
    outline: none;
    transition: border-color 0.2s;
  }

  .price-input:focus { border-color: var(--accent); background: #fff; }
  .price-unit { font-size: 12px; color: var(--text-muted); }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 17px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 16px;
    box-shadow: 0 4px 16px rgba(61,122,47,0.3);
  }

  .submit-btn:hover { background: #2d6020; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .feedback-wrap {
    margin-top: 20px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    overflow: hidden;
  }

  .feedback-header {
    background: var(--accent);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feedback-header h3 { font-size: 14px; font-weight: 700; color: #fff; }

  .ai-badge {
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
  }

  .score-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 14px 18px 0;
  }

  .chip {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .chip.good { background: var(--accent-light); color: var(--accent); }
  .chip.warn { background: var(--warning-light); color: var(--warning); }
  .chip.bad { background: var(--danger-light); color: var(--danger); }

  .feedback-body {
    padding: 16px 18px 20px;
    font-size: 13px;
    line-height: 1.9;
    color: var(--text);
    white-space: pre-wrap;
  }

  .loading-dots {
    display: flex;
    gap: 6px;
    padding: 20px 18px;
    align-items: center;
  }

  .loading-dots span {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.3; }
    50% { transform: translateY(-7px); opacity: 1; }
  }

  .history-item {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
  }

  .history-date {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .history-meal-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .history-meal-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .history-meal-skip { color: var(--text-muted); font-style: italic; }

  .history-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .history-total {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
  }

  .history-total.ok { color: var(--accent); }
  .history-total.over { color: var(--warning); }
  .history-chips { display: flex; gap: 6px; }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 44px; margin-bottom: 14px; }
  .empty-text { font-size: 13px; line-height: 1.7; }

  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🥗</div>
  <div class="header-text">
    <h1>栄養管理トラッカー</h1>
    <p>毎日の食事を記録してフィードバックをもらおう</p>
  </div>
</div>
<div class="date-strip">
  <div class="date-text" id="currentDate">---</div>
</div>

<div class="container">

  <div class="budget-card">
    <div class="budget-card-top">
      <div>
        <div class="budget-label">今日の合計金額</div>
        <div class="budget-amount"><span class="yen">¥</span><span id="totalBudget">0</span></div>
      </div>
      <div class="budget-limit-badge">目標 ¥1,100</div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="budgetBar" style="width:0%"></div>
    </div>
    <div class="budget-status">
      <span id="budgetStatusText">まだ記録がありません</span>
      <span id="budgetRemaining">残り ¥1,100</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('record')">📝 今日を記録</button>
    <button class="tab" onclick="switchTab('history')">📊 過去の記録</button>
  </div>

  <div class="panel active" id="panel-record">

    <div class="section-header">今日の食事を入力</div>

    <div class="meal-cards">

      <div class="meal-card" id="card-morning">
        <div class="meal-card-top">
          <div class="meal-icon">🌅</div>
          <div class="meal-info">
            <div class="meal-name">朝ごはん</div>
            <div class="meal-time">Morning</div>
          </div>
          <div class="meal-price-badge empty" id="badge-morning">¥0</div>
        </div>
        <div class="meal-card-body">
          <textarea class="meal-input" id="meal-morning" placeholder="例）ULTORAプロテイン1本　※なしの場合は空欄でOK" rows="2" oninput="updateCard('morning')"></textarea>
          <div class="price-row">
            <span class="price-label">💴 金額</span>
            <input type="number" class="price-input" id="price-morning" placeholder="0" oninput="updateCard('morning'); updateBudget()">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>

      <div class="meal-card has-content" id="card-lunch">
        <div class="meal-card-top">
          <div class="meal-icon">☀️</div>
          <div class="meal-info">
            <div class="meal-name">昼ごはん</div>
            <div class="meal-time">Lunch</div>
          </div>
          <div class="meal-price-badge" id="badge-lunch">¥511</div>
        </div>
        <div class="meal-card-body">
          <textarea class="meal-input" id="meal-lunch" rows="2" oninput="updateCard('lunch')">塩おにぎり・サラダチキンバー（スモークペッパー）・デカうまわかめそば</textarea>
          <div class="price-row">
            <span class="price-label">💴 金額</span>
            <input type="number" class="price-input" id="price-lunch" value="511" oninput="updateCard('lunch'); updateBudget()">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>

      <div class="meal-card" id="card-dinner">
        <div class="meal-card-top">
          <div class="meal-icon">🌙</div>
          <div class="meal-info">
            <div class="meal-name">夜ごはん</div>
            <div class="meal-time">Dinner</div>
          </div>
          <div class="meal-price-badge empty" id="badge-dinner">¥0</div>
        </div>
        <div class="meal-card-body">
          <textarea class="meal-input" id="meal-dinner" placeholder="例）納豆巻き×2・カゴメスムージー・味噌汁" rows="2" oninput="updateCard('dinner')"></textarea>
          <div class="price-row">
            <span class="price-label">💴 金額</span>
            <input type="number" class="price-input" id="price-dinner" placeholder="0" oninput="updateCard('dinner'); updateBudget()">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>

      <div class="meal-card" id="card-snack">
        <div class="meal-card-top">
          <div class="meal-icon">🍫</div>
          <div class="meal-info">
            <div class="meal-name">間食・その他</div>
            <div class="meal-time">Snack（任意）</div>
          </div>
          <div class="meal-price-badge empty" id="badge-snack">¥0</div>
        </div>
        <div class="meal-card-body">
          <textarea class="meal-input" id="meal-snack" placeholder="例）ゆで卵1個" rows="2" oninput="updateCard('snack')"></textarea>
          <div class="price-row">
            <span class="price-label">💴 金額</span>
            <input type="number" class="price-input" id="price-snack" placeholder="0" oninput="updateCard('snack'); updateBudget()">
            <span class="price-unit">円</span>
          </div>
        </div>
      </div>

    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitMeals()">
      🤖 AIにフィードバックをもらう
    </button>

    <div id="feedbackArea" style="display:none;">
      <div class="feedback-wrap">
        <div class="feedback-header">
          <h3>💬 栄養管理フィードバック</h3>
          <span class="ai-badge">AI</span>
        </div>
        <div id="scoreChips" class="score-chips" style="display:none;"></div>
        <div id="feedbackContent"></div>
      </div>
    </div>

  </div>

  <div class="panel" id="panel-history">
    <div class="section-header">過去の記録</div>
    <div id="historyList">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">まだ記録がありません<br>今日の食事を記録してみよう！</div>
      </div>
    </div>
  </div>

</div>

<script>
  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
  document.getElementById('currentDate').textContent = dateStr;

  updateBudget();

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['record','history'][i] === tab);
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'history') renderHistory();
  }

  function updateCard(meal) {
    const val = document.getElementById('meal-' + meal).value.trim();
    const price = parseInt(document.getElementById('price-' + meal).value) || 0;
    const badge = document.getElementById('badge-' + meal);
    const card = document.getElementById('card-' + meal);
    badge.textContent = '¥' + price.toLocaleString();
    if (val || price > 0) {
      badge.classList.remove('empty');
      card.classList.add('has-content');
    } else {
      badge.classList.add('empty');
      card.classList.remove('has-content');
    }
  }

  function updateBudget() {
    const prices = ['morning','lunch','dinner','snack'].map(m => parseInt(document.getElementById('price-' + m).value) || 0);
    const total = prices.reduce((a, b) => a + b, 0);
    document.getElementById('totalBudget').textContent = total.toLocaleString();

    const pct = Math.min((total / 1100) * 100, 100);
    const bar = document.getElementById('budgetBar');
    bar.style.width = pct + '%';

    const remaining = 1100 - total;
    const remEl = document.getElementById('budgetRemaining');
    const statusEl = document.getElementById('budgetStatusText');

    if (total === 0) {
      bar.style.background = 'linear-gradient(90deg, #3d7a2f, #6ab04c)';
      statusEl.textContent = 'まだ記録がありません';
      remEl.textContent = '残り ¥1,100';
      remEl.style.color = '';
    } else if (total <= 1100) {
      bar.style.background = 'linear-gradient(90deg, #3d7a2f, #6ab04c)';
      statusEl.textContent = '✅ 予算内です！';
      remEl.style.color = '#3d7a2f';
      remEl.textContent = '残り ¥' + remaining.toLocaleString();
    } else if (total <= 1300) {
      bar.style.background = 'linear-gradient(90deg, #d4891a, #f0a832)';
      statusEl.textContent = '⚠️ 少しオーバー';
      remEl.style.color = '#d4891a';
      remEl.textContent = '¥' + Math.abs(remaining).toLocaleString() + ' オーバー';
    } else {
      bar.style.background = 'linear-gradient(90deg, #e05252, #f07070)';
      statusEl.textContent = '❌ 予算オーバー';
      remEl.style.color = '#e05252';
      remEl.textContent = '¥' + Math.abs(remaining).toLocaleString() + ' オーバー';
    }
  }

  async function submitMeals() {
    const morning = document.getElementById('meal-morning').value.trim();
    const lunch = document.getElementById('meal-lunch').value.trim();
    const dinner = document.getElementById('meal-dinner').value.trim();
    const snack = document.getElementById('meal-snack').value.trim();

    if (!morning && !lunch && !dinner) {
      alert('最低1食は入力してください！');
      return;
    }

    const pMorning = parseInt(document.getElementById('price-morning').value) || 0;
    const pLunch = parseInt(document.getElementById('price-lunch').value) || 0;
    const pDinner = parseInt(document.getElementById('price-dinner').value) || 0;
    const pSnack = parseInt(document.getElementById('price-snack').value) || 0;
    const total = pMorning + pLunch + pDinner + pSnack;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 分析中...';

    document.getElementById('feedbackArea').style.display = 'block';
    document.getElementById('scoreChips').style.display = 'none';
    document.getElementById('feedbackContent').innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

    const prompt = `あなたはベテランのパーソナルトレーナー兼栄養管理士です。
以下の27歳・デスクワーク営業職（1日の目標予算1,100円）の食事記録を見て、栄養バランスと予算の観点からフィードバックをしてください。

【今日の食事記録】
朝ごはん：${morning || 'なし'}（${pMorning}円）
昼ごはん：${lunch || 'なし'}（${pLunch}円）
夜ごはん：${dinner || 'なし'}（${pDinner}円）
間食：${snack || 'なし'}（${pSnack}円）
合計：${total}円

【フィードバック形式】
以下の形式で日本語で返してください。フレンドリーで励ましのある口調で、シンプルに。

🟢 良かった点（1〜2つ）
🔴 改善したい点（1〜2つ）
💡 明日のアドバイス（1つだけ）
💰 予算評価（一言）

200文字以内でコンパクトにまとめてください。`;

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(i => i.text || '').join('');

      document.getElementById('feedbackContent').innerHTML = '<div class="feedback-body">' + text + '</div>';

      const chips = document.getElementById('scoreChips');
      chips.style.display = 'flex';
      chips.innerHTML = '';

      chips.innerHTML += morning ? '<div class="chip good">🌅 朝食あり</div>' : '<div class="chip warn">🌅 朝食なし</div>';
      chips.innerHTML += total <= 1100 ? '<div class="chip good">💰 予算内 ¥' + total + '</div>' : '<div class="chip warn">💰 ¥' + (total - 1100) + 'オーバー</div>';

      const allMeals = [morning, lunch, dinner, snack].join('');
      const hasProtein = allMeals.includes('サラダチキン') || allMeals.includes('プロテイン') || allMeals.includes('ゆで卵') || allMeals.includes('納豆');
      chips.innerHTML += hasProtein ? '<div class="chip good">💪 タンパク質OK</div>' : '<div class="chip bad">💪 タンパク質不足</div>';

      saveHistory({ date: dateStr, morning, lunch, dinner, snack, total, feedback: text });

    } catch (e) {
      document.getElementById('feedbackContent').innerHTML = '<div class="feedback-body" style="color:var(--danger)">エラーが発生しました。もう一度試してください。</div>';
    }

    btn.disabled = false;
    btn.textContent = '🤖 AIにフィードバックをもらう';
  }

  function saveHistory(entry) {
    const history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
    history.unshift(entry);
    if (history.length > 30) history.pop();
    localStorage.setItem('nutritionHistory', JSON.stringify(history));
  }

  function renderHistory() {
    const history = JSON.parse(localStorage.getItem('nutritionHistory') || '[]');
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">まだ記録がありません<br>今日の食事を記録してみよう！</div></div>';
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-item">
        <div class="history-date">${h.date}</div>
        <div class="history-meal-row"><span class="history-meal-icon">🌅</span><span>${h.morning || '<span class="history-meal-skip">朝食なし</span>'}</span></div>
        <div class="history-meal-row"><span class="history-meal-icon">☀️</span><span>${h.lunch || '<span class="history-meal-skip">昼食なし</span>'}</span></div>
        <div class="history-meal-row"><span class="history-meal-icon">🌙</span><span>${h.dinner || '<span class="history-meal-skip">夕食なし</span>'}</span></div>
        <div class="history-bottom">
          <div class="history-total ${h.total <= 1100 ? 'ok' : 'over'}">¥${h.total.toLocaleString()}</div>
          <div class="history-chips">
            ${h.morning ? '<div class="chip good">🌅 朝食あり</div>' : '<div class="chip warn">🌅 朝食なし</div>'}
            ${h.total <= 1100 ? '<div class="chip good">💰 予算内</div>' : '<div class="chip warn">💰 オーバー</div>'}
          </div>
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
